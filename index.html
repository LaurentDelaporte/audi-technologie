<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Audi Expert Tech Quiz - 50 Questions</title>
    <style>
        :root { --audi-red: #f1052d; --bg-black: #050505; --paper: #e5e5e5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-black); color: var(--paper); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #quiz-container { width: 90%; max-width: 800px; background: #111; padding: 40px; border: 1px solid #333; text-align: center; }
        .options { display: grid; gap: 12px; margin-top: 25px; }
        button { padding: 18px; cursor: pointer; background: #222; color: white; border: 1px solid #444; font-weight: bold; transition: 0.3s; }
        button:hover { background: var(--audi-red); }
        .correct { background: #28a745 !important; border-color: #28a745 !important; }
        .wrong { background: #dc3545 !important; border-color: #dc3545 !important; }
        #insight-box { margin-top: 25px; padding: 20px; background: #1a1a1a; display: none; border-left: 5px solid var(--audi-red); text-align: left; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="game-view">
        <h2 style="color: var(--audi-red);">AUDI EXPERT TECH - NIVEAU AVANCÉ</h2>
        <div id="question-text" style="font-size: 1.3rem; margin: 30px 0; font-weight: 600;"></div>
        <div id="options-container" class="options"></div>
        <div id="insight-box">
            <p id="insight-text" style="line-height: 1.6;"></p>
            <button id="next-btn" onclick="nextQuestion()" style="margin-top:15px;">Question suivante →</button>
        </div>
    </div>
</div>

<script>
// Base de données : 50 questions techniques de niveau expert
const quizExpert = [
    { q: "Quelle est la fréquence de découpage (PWM) des onduleurs des moteurs MGU05 de l'Audi RS Q e-tron ?", o: ["10 kHz", "20 kHz", "16 kHz", "8 kHz"], a: 2, i: "La gestion fine du courant via PWM à 16 kHz est cruciale pour le rendement thermique des moteurs." },
    { q: "Sur la plateforme PPE, quelle technologie gère la déconnexion mécanique des moteurs ?", o: ["Embrayage à friction", "Désaccoupleur à crabots", "Convertisseur hydraulique", "Planétaire"], a: 1, i: "Le désaccoupleur à crabots permet une efficience maximale en mode croisière." },
    { q: "Quelle est la température optimale de service du fluide diélectrique dans les batteries PPE ?", o: ["35°C", "55°C", "25°C", "45°C"], a: 0, i: "Le système maintient la batterie proche de 35°C pour maximiser la capacité de charge rapide." },
    { q: "Que permet le 'torque vectoring' actif sur l'essieu arrière de l'e-tron S ?", o: ["Désactivation du freinage", "Répartition vectorielle par embrayages", "Pilotage directionnel", "Gestion du couple par l'ABS"], a: 1, i: "Il utilise deux moteurs arrière gérés indépendamment sans différentiel mécanique." },
    { q: "Quelle est la précision du LiDAR utilisé dans le système Audi zFAS ?", o: ["10 cm", "2 cm", "5 cm", "1 cm"], a: 1, i: "Le scanner laser permet une cartographie 3D environnementale au centimètre près." },
    { q: "Comment le cycle B-cycle gère-t-il les pompes à huile ?", o: ["Vitesse fixe", "Débit variable piloté", "Pression constante", "Débrayable"], a: 1, i: "Le débit est régulé en temps réel par le calculateur moteur pour réduire les pertes par pompage." },
    { q: "Quel matériau compose les disques de freins carbone-céramique Audi Sport ?", o: ["Carbone pur", "Carbure de silicium renforcé", "Alumine", "Acier fritté"], a: 1, i: "Le composite carbure de silicium offre une résistance thermique extrême." },
    { q: "Quelle tension auxiliaire le convertisseur DC/DC PPE fournit-il ?", o: ["24V", "48V", "12V", "220V"], a: 2, i: "Le 12V reste le standard pour les calculateurs et l'électronique de confort." },
    { q: "La gestion thermique des moteurs e-tron utilise quelle technologie de pompe ?", o: ["Centrifuge à vitesse fixe", "Centrifuge pilotée par PWM", "Engrenage", "Péristaltique"], a: 1, i: "La pompe centrifuge pilotée permet d'ajuster le flux selon la température moteur/batterie." },
    { q: "Comment l'Audi A8 gère-t-elle l'inclinaison en virage (Active Suspension) ?", o: ["Vérins hydrauliques", "Actionneurs électromécaniques 48V", "Coussins d'air", "Amortisseurs magnétiques"], a: 1, i: "Chaque roue est équipée d'un moteur électrique 48V capable de soulever/abaisser le châssis en quelques ms." },
    { q: "Quelle est la particularité du moteur 2.5 TFSI 5 cylindres ?", o: ["Ordre allumage 1-2-4-5-3", "Ordre allumage 1-5-2-4-3", "Vilebrequin à plat", "Architecture boxer"], a: 1, i: "Cet ordre spécifique (1-5-2-4-3) est le secret de sa sonorité iconique." },
    { q: "Qu'est-ce que le 'Coasting' dans les systèmes Mild Hybrid (MHEV) 48V ?", o: ["Freinage forcé", "Mode roue libre avec moteur coupé", "Mode sport", "Charge rapide"], a: 1, i: "Le moteur thermique est totalement débrayé et coupé pour économiser le carburant." },
    { q: "Quel type de rotor est utilisé dans les moteurs synchrones Audi ?", o: ["Rotor bobiné", "Rotor à aimants permanents (PSM)", "Rotor à cage d'écureuil", "Rotor à réluctance"], a: 1, i: "Les moteurs PSM offrent la meilleure densité de puissance pour les véhicules Audi." },
    { q: "À quoi sert la vanne thermostatique pilotée dans le circuit MMI ?", o: ["Chauffage habitacle", "Refroidissement batterie", "Refroidissement onduleur", "Gestion des flux de refroidissement croisés"], a: 3, i: "Le système permet de transférer la chaleur du moteur vers la batterie ou inversement." },
    { q: "Quelle est la fonction du 'Pre-fill' du système de freinage ?", o: ["Purger l'air", "Remplir le circuit pour réduire la garde à la pédale", "Refroidir les plaquettes", "Augmenter la pression ABS"], a: 1, i: "Le système met les plaquettes en contact avec le disque dès le lever de pied pour réduire le temps de réponse." },
    { q: "Sur les modèles J1, quelle est la fonction du 'Range Mode' ?", o: ["Augmente la vitesse", "Limite puissance/vitesse et optimise clim", "Désactive l'ABS", "Active le drift"], a: 1, i: "Il optimise tous les paramètres de consommation pour maximiser l'autonomie." },
    { q: "Que mesure le capteur de 'SOH' (State of Health) de la batterie ?", o: ["Charge restante", "Dégradation chimique et capacité réelle", "Température interne", "Tension maximale"], a: 1, i: "Le SOH évalue la capacité de la batterie par rapport à son état neuf." },
    { q: "Comment Audi gère-t-elle l'acoustique moteur sur l'e-tron GT ?", o: ["Haut-parleurs uniquement", "Générateur de son électronique intérieur/extérieur", "Échappement actif", "Isolation passive"], a: 1, i: "Le système e-tron sport sound génère une signature sonore spécifique corrélée à la charge moteur." },
    { q: "Quel est l'avantage du 'Multi-link' arrière sur les modèles RS ?", o: ["Simplicité", "Guidage géométrique précis des roues", "Coût réduit", "Légèreté"], a: 1, i: "Le multi-link permet de contrôler le carrossage et le pincement dynamique." },
    { q: "Quelle technologie empêche le patinage lors de la régénération ?", o: ["Répartition intelligente du freinage (EBD)", "ESP", "Différentiel mécanique", "Régulateur de couple"], a: 0, i: "L'EBD gère la répartition entre le freinage électrique et hydraulique pour éviter le blocage." },
    { q: "Quel est le nom du système de filtration de l'air des moteurs TFSI ?", o: ["Filtre à particules essence (OPF)", "Catalyseur 3 voies", "Filtre à charbon", "Filtre cyclonique"], a: 0, i: "L'OPF est devenu indispensable pour respecter les normes Euro 6d." },
    { q: "Quelle technologie équipe les feux arrière du Q6 e-tron ?", o: ["LED matricielles", "OLED 2.0 (signatures digitales)", "Fibres", "Laser"], a: 1, i: "Audi utilise la technologie OLED pour créer des animations dynamiques." },
    { q: "Quelle est la tension nominale d'un système MHEV Audi ?", o: ["12V", "24V", "48V", "110V"], a: 2, i: "Le système 48V permet d'assister le moteur via l'alterno-démarreur." },
    { q: "Que gère le calculateur zFAS ?", o: ["Moteur", "Suspension", "Pilotage autonome (ADX)", "Audio"], a: 2, i: "Le zFAS est le cerveau central de toutes les aides à la conduite (ADAS)." },
    { q: "Comment le turbo est-il refroidi après coupure moteur ?", o: ["Pompe à eau électrique auxiliaire", "Convection naturelle", "Ventilation forcée", "Huile"], a: 0, i: "La pompe auxiliaire évite la cokéfaction de l'huile dans le palier." },
    { q: "Quel gaz est utilisé dans la climatisation Audi moderne ?", o: ["R134a", "R1234yf", "Fréon", "Ammoniac"], a: 1, i: "Le R1234yf est obligatoire pour son faible impact sur l'effet de serre." },
    { q: "Quelle est la particularité des disques de frein ventilés par 'piliers' ?", o: ["Plus légers", "Meilleure dissipation thermique que les ailettes droites", "Plus chers", "Plus fragiles"], a: 1, i: "La structure en piliers favorise un flux d'air turbulent optimisé." },
    { q: "Quel mode de propulsion est utilisé par l'Audi A3 hybride ?", o: ["Parallel Hybrid", "Series Hybrid", "Full Electric", "Micro Hybrid"], a: 0, i: "Les moteurs électrique et thermique travaillent en parallèle via une boîte DSG." },
    { q: "Qu'est-ce que l'injection directe 'Common Rail' ?", o: ["Rampe commune haute pression", "Injection basse pression", "Injection par carburateur", "Injection gaz"], a: 0, i: "La rampe commune permet une pression d'injection indépendante du régime." },
    { q: "Comment Audi nomme sa transmission automatique à double embrayage ?", o: ["Tiptronic", "S-tronic", "Multitronic", "Direct Shift"], a: 1, i: "S-tronic est le nom commercial des boîtes DSG chez Audi." },
    { q: "Quelle est la fonction du 'différentiel central couronne' ?", o: ["Répartition du couple avant/arrière", "Blocage de roue", "Direction", "Freinage"], a: 0, i: "Il permet une répartition dynamique de 40/60 par défaut." },
    { q: "Qu'est-ce que le 'B-mode' sur la boîte de vitesse e-tron ?", o: ["Parking", "Freinage régénératif maximal", "Sport", "Mode éco"], a: 1, i: "Le B-mode augmente la force de récupération lors du lâcher d'accélérateur." },
    { q: "Quel type de carrosserie utilise majoritairement le 'thermoformage' ?", o: ["Pièces de structure acier (montants)", "Panneaux de porte", "Toit", "Jantes"], a: 0, i: "L'acier embouti à chaud garantit une sécurité maximale pour le cockpit." },
    { q: "La gestion électronique du différentiel EDS fait quoi ?", o: ["Freine la roue qui patine", "Bloque les 4 roues", "Désactive le moteur", "Change la suspension"], a: 0, i: "L'EDS simule un différentiel autobloquant via l'ABS." },
    { q: "Quel est l'intérêt d'un moteur à course longue (long stroke) ?", o: ["Haut régime", "Couple à bas régime", "Vitesse max", "Légèreté"], a: 1, i: "La course longue favorise le couple grâce au bras de levier." },
    { q: "Qu'est-ce que l'injection 'MPI' ?", o: ["Injection multipoint (indirecte)", "Injection directe", "Carburateur", "Injection haute pression"], a: 0, i: "L'injection multipoint injecte dans le collecteur d'admission." },
    { q: "Comment Audi gère-t-elle les gaz d'échappement en phase de chauffe ?", o: ["Injection tardive pour chauffer le catalyseur", "Ralenti accéléré", "Ventilateur", "Bypass"], a: 0, i: "L'injection tardive augmente la température des gaz pour activer le catalyseur." },
    { q: "À quoi sert la vanne EGR haute pression ?", o: ["Réduction NOx", "Augmentation puissance", "Refroidissement turbo", "Bruit"], a: 0, i: "Recycler des gaz brûlés réduit la température de combustion et donc les NOx." },
    { q: "Que permet la transmission 'Tiptronic' ?", o: ["Changement manuel séquentiel", "Mode automatique uniquement", "Mode électrique", "Drift"], a: 0, i: "Tiptronic permet d'imposer un rapport via le levier ou les palettes." },
    { q: "Quelle technologie réduit les frictions des cylindres ?", o: ["Revêtement plasma (APS)", "Céramique", "Huile spéciale", "Chromage"], a: 0, i: "L'APS (Atmospheric Plasma Spray) réduit drastiquement les frottements." },
    { q: "Qu'est-ce qu'une structure 'sandwich' dans les batteries e-tron ?", o: ["Assemblage de modules et refroidissement", "Structure carrosserie", "Sièges", "Tableau de bord"], a: 0, i: "Le pack batterie empile couches actives et circuits de refroidissement." },
    { q: "Quelle est la fonction du capteur d'angle de braquage ?", o: ["Aide au stationnement", "Pilotage ESP et Quattro", "Gestion moteur", "Radio"], a: 1, i: "Il est crucial pour l'ESP qui compare angle volant et trajectoire réelle." },
    { q: "Qu'est-ce qu'un moteur à 'flux transversal' ?", o: ["Type de moteur électrique spécialisé", "Type de turbo", "Mode hybride", "Type de boîte"], a: 0, i: "Le flux transversal permet une densité de couple très élevée." },
    { q: "Quel est l'avantage du refroidissement 'indirect' batterie ?", o: ["Plus simple à réparer", "Meilleure gestion thermique", "Moins cher", "Plus léger"], a: 1, i: "Le refroidissement indirect isole mieux les cellules en cas de fuite." },
    { q: "Comment Audi contrôle-t-elle la pression d'huile ?", o: ["Pompe à huile pilotée par map", "Pompe constante", "Gravité", "Réservoir secondaire"], a: 0, i: "La pompe pilotée réduit la charge mécanique du moteur." },
    { q: "Que permet le 'Launch Control' ?", o: ["Départ arrêté optimisé", "Mode parking", "Mode neige", "Vitesse max"], a: 0, i: "Gestion optimisée du couple et de la motricité au départ." },
    { q: "Quel type de turbo est utilisé sur les moteurs 4.0 V8 TFSI ?", o: ["Mono-turbo", "Bi-turbo (Twin-scroll)", "Quadri-turbo", "Électrique"], a: 1, i: "Le bi-turbo en position 'Hot V' (au centre) réduit le lag." },
    { q: "Quelle est la particularité du moteur 3.0 TDI V6 ?", o: ["Distribution par chaîne", "Distribution par courroie", "Distribution par cascade de pignons", "Pas de distribution"], a: 0, i: "La chaîne est utilisée pour la durabilité et la précision." },
    { q: "Qu'est-ce que l'injection 'Stratifiée' ?", o: ["Mélange pauvre localisé à la bougie", "Mélange riche permanent", "Mélange homogène", "Pas de mélange"], a: 0, i: "Elle optimise la combustion en charge partielle pour consommer moins." },
    { q: "Quelle est la mission d'Audi pour 2033 ?", o: ["100% électrique", "Fusion groupe", "Abandon auto", "Tout diesel"], a: 0, i: "Audi a annoncé l'arrêt progressif du thermique d'ici 2033." }
];

let currentIdx = 0;

function loadQ() {
    if(currentIdx >= quizExpert.length) { alert("Quiz terminé. Maîtrise confirmée."); location.reload(); return; }
    const q = quizExpert[currentIdx];
    document.getElementById('question-text').innerText = (currentIdx + 1) + ". " + q.q;
    const cont = document.getElementById('options-container');
    cont.innerHTML = '';
    q.o.forEach((opt, i) => {
        const b = document.createElement('button');
        b.innerText = opt;
        b.onclick = () => reveal(i);
        cont.appendChild(b);
    });
    document.getElementById('insight-box').style.display = 'none';
}

function reveal(idx) {
    const correct = quizExpert[currentIdx].a;
    const btns = document.querySelectorAll('.options button');
    btns.forEach((b, i) => {
        b.disabled = true;
        if(i === correct) b.classList.add('correct');
        else if(i === idx) b.classList.add('wrong');
    });
    document.getElementById('insight-text').innerText = quizExpert[currentIdx].i;
    document.getElementById('insight-box').style.display = 'block';
}

function nextQuestion() {
    currentIdx++;
    loadQ();
}

loadQ();
</script>
</body>
</html>
