<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Audi Master Quiz</title>
    <style>
        :root { --audi-red: #f1052d; --bg-black: #050505; --paper: #e5e5e5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-black); color: var(--paper); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #quiz-container { width: 90%; max-width: 700px; background: #111; padding: 30px; border: 1px solid #333; text-align: center; }
        .options { display: grid; gap: 10px; margin-top: 20px; }
        button { padding: 15px; cursor: pointer; background: #222; color: white; border: 1px solid #444; font-weight: bold; }
        button:hover { background: var(--audi-red); }
        .correct { background: #28a745 !important; }
        .wrong { background: #dc3545 !important; }
        #insight-box { margin-top: 20px; padding: 15px; background: #1a1a1a; display: none; border-left: 4px solid var(--audi-red); text-align: left; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="menu-view">
        <h1>AUDI MASTER QUIZ</h1>
        <button onclick="startGame('history')">HISTOIRE & HÉRITAGE</button>
        <button onclick="startGame('tech')">TECHNOLOGIE & FUTUR</button>
    </div>

    <div id="game-view" style="display:none;">
        <div id="question-text" style="font-size: 1.2rem; margin: 20px 0;"></div>
        <div id="options-container" class="options"></div>
        <div id="insight-box">
            <p id="insight-text"></p>
            <button id="next-btn" onclick="nextQuestion()">Suivant →</button>
        </div>
    </div>
</div>

<script>
// Liste 1 : Histoire
const quizHistory = [
    { q: "En quelle année August Horch a-t-il fondé sa première société ?", o: ["1899", "1904", "1909", "1932"], a: 0, i: "August Horch a fondé son entreprise à Cologne." },
    { q: "Que signifie 'Audi' en latin ?", o: ["Quatre", "Écoute !", "Cercle", "Rapide"], a: 1, i: "C'est la traduction latine de 'Horch' (écoute)." }
];

// Liste 2 : Technologie (50 questions)
const quizTech = [
    { q: "Quelle est la tension de l'architecture électrique de l'Audi e-tron GT ?", o: ["400V", "800V", "1000V", "12V"], a: 1, i: "L'architecture 800V permet une charge ultra-rapide." },
    { q: "Comment s'appelle la plateforme électrique développée avec Porsche ?", o: ["MEB", "PPE", "MQB", "MLB"], a: 1, i: "La Premium Platform Electric (PPE) équipe les nouveaux modèles comme le Q6 e-tron." },
    { q: "Qu'est-ce que l'Audi 'Quattro Ultra' ?", o: ["4x4 permanent", "Système déconnectable", "Moteur hybride", "Aide au parking"], a: 1, i: "Il permet d'économiser du carburant en passant en traction simple quand le 4x4 n'est pas requis." },
    { q: "Quelle technologie Audi remplace les rétroviseurs ?", o: ["Caméras virtuelles", "Radars", "Lidar", "Rétros repliables"], a: 0, i: "Les Virtual Mirrors réduisent la traînée aérodynamique." },
    { q: "Quel est le nom de la gamme 100% électrique ?", o: ["e-tron", "Quattro", "RS", "S-Line"], a: 0, i: "La gamme e-tron désigne les véhicules électriques." },
    { q: "Quel moteur utilise l'Audi RS Q e-tron sur le Dakar ?", o: ["V8 essence", "Électrique avec prolongateur", "Diesel", "Hydrogène"], a: 1, i: "Il utilise des moteurs électriques et un convertisseur d'énergie." },
    { q: "Que signifie 'TFSI' ?", o: ["Turbo Fuel Stratified Injection", "Twin Fuel System", "Turbo Fast Sport", "Total Fluid"], a: 0, i: "Association de la turbocompression et de l'injection directe." },
    { q: "Quelle est la particularité des phares Matrix LED ?", o: ["Rotation", "Désactivation de segments", "Laser", "Couleurs"], a: 1, i: "Ils permettent de garder les pleins phares sans éblouir." },
    { q: "Qu'est-ce que l'Audi 'Predictive Efficiency Assistant' ?", o: ["Anticipation trafic", "Freinage d'urgence", "Parking", "Suspension"], a: 0, i: "Il utilise le GPS pour optimiser la consommation." },
    { q: "Quelle technologie équipe l'A8 pour les chocs latéraux ?", o: ["Suspension active", "Airbags extérieurs", "Radar 360", "Carbone"], a: 0, i: "La suspension active lève la voiture pour absorber le choc." },
    { q: "Sur quel modèle sont apparus les phares Laser ?", o: ["A3", "R8 LMX", "Q7", "TT"], a: 1, i: "La R8 LMX était pionnière en 2014." },
    { q: "Avantage de l'aluminium (ASF) ?", o: ["Prix", "Légèreté/Rigidité", "Réparation", "Design"], a: 1, i: "L'Audi Space Frame améliore le dynamisme." },
    { q: "Qu'est-ce que l'e-quattro ?", o: ["4x4 mécanique", "4 roues motrices électriques", "Mode sport", "Luxe"], a: 1, i: "Chaque essieu est motorisé indépendamment." },
    { q: "Nom du système d'infotainment ?", o: ["MDI", "MMI", "iDrive", "Sync"], a: 1, i: "Le Multi Media Interface est le cœur numérique." },
    { q: "SUV coupé chez Audi ?", o: ["Q4 Sportback", "A3 e-tron", "Q7 e-tron", "R8 e-tron"], a: 0, i: "Désignation 'Sportback' pour le toit fuyant." },
    { q: "Qu'est-ce que CARIAD ?", o: ["Division sport", "Branche logicielle", "Design", "Moteurs"], a: 1, i: "CARIAD développe l'architecture logicielle du groupe." },
    { q: "Fonction du freinage régénératif ?", o: ["Nettoyage", "Recharge batterie", "Freinage court", "Refroidissement"], a: 1, i: "Conversion d'énergie cinétique en électricité." },
    { q: "Personnalisation des feux sur Q6 e-tron ?", o: ["LED", "OLED numérique", "Laser", "Fibres"], a: 1, i: "Technologie OLED numérique pour signatures lumineuses." },
    { q: "Type de moteur 5 cylindres TFSI ?", o: ["V5", "Ligne", "Boxer", "Rotatif"], a: 1, i: "5 cylindres en ligne emblématique." },
    { q: "Signification 'e-tron' ?", o: ["Électronique", "Électrique", "Nom propre", "Énergie"], a: 2, i: "Marque technologique, pas une traduction." },
    { q: "Caractéristique hybride rechargeable ?", o: ["Auto-recharge", "Rechargeable secteur", "Diesel", "Sans essence"], a: 1, i: "Mode 100% électrique sur distance limitée." },
    { q: "Comment Audi appelle ses hybrides rechargeables ?", o: ["TFSI e", "e-tron S", "Hybrid", "Quattro e"], a: 0, i: "Nomenclature 'TFSI e'." },
    { q: "Ressorts de suspension légers ?", o: ["Titane", "Acier", "Polymère (GFRP)", "Alu"], a: 2, i: "Le GFRP réduit le poids non suspendu." },
    { q: "Parking Pilot (avancé) ?", o: ["Autonome", "Recul simple", "Caméra 360", "Freinage"], a: 0, i: "Garer seul sans conducteur." },
    { q: "Intérêt du Böllinger Höfe ?", o: ["Design", "Site sportives", "Musée", "Moteurs"], a: 1, i: "Usine pour modèles haute performance." },
    { q: "Qu'est-ce que le Virtual Cockpit ?", o: ["Tableau numérique", "Écran tactile", "App", "Toit"], a: 0, i: "Tableau de bord numérique configurable." },
    { q: "Division des modèles RS ?", o: ["Audi Sport", "Quattro", "RS Corp", "S-Line"], a: 0, i: "Audi Sport GmbH gère la performance." },
    { q: "Pilotage niveau 3 ?", o: ["A6", "A8", "R8", "Q7"], a: 1, i: "L'A8 D5 fut la première." },
    { q: "Acoustique électriques ?", o: ["Mousse", "Vitrage + suppression active", "Moteur", "Design"], a: 1, i: "Vitrage spécifique et réduction active du bruit." },
    { q: "Rôle du LiDAR ?", o: ["Scan 3D", "Radio", "Nav", "Musique"], a: 0, i: "Sécurité et assistance avancée." },
    { q: "Qui a aidé le TDI ?", o: ["Fiat", "Mercedes", "Aucun", "BMW"], a: 2, i: "Développement interne." },
    { q: "Particularité 2.0 TFSI ?", o: ["Cycle Miller", "Électrique", "Pas turbo", "V6"], a: 0, i: "Cycle B-cycle pour l'efficience." },
    { q: "Audi Drive Select ?", o: ["Modes conduite", "Roues", "Recul", "Vitesse"], a: 0, i: "Réglages moteur/suspension." },
    { q: "Refroidissement liquide batterie ?", o: ["Vitesse", "Longévité/Puissance", "Prix", "Poids"], a: 1, i: "Stabilité thermique cruciale." },
    { q: "Modèles hydrogène ?", o: ["Série", "Aucun", "Prototypage (h-tron)", "Camions"], a: 2, i: "Priorité au 100% électrique." },
    { q: "Suspension Magnetic Ride ?", o: ["Fluide ferreux piloté", "Air", "Fixe", "Fer"], a: 0, i: "Changement de viscosité instantané." },
    { q: "Freinage carbone-céramique ?", o: ["Chauffent moins", "Durent moins", "Fonte", "Fragiles"], a: 0, i: "Endurance extrême." },
    { q: "Audi Phone Box ?", o: ["Téléphone", "Induction/Antenne", "Housse", "Accessoire"], a: 1, i: "Recharge et amplification." },
    { q: "Mise à jour logicielle ?", o: ["Garage", "OTA", "CD", "Aucune"], a: 1, i: "Mises à jour à distance." },
    { q: "Future génération cockpit ?", o: ["Panoramic", "MMI Touch Response", "Smart", "Digital"], a: 1, i: "Standard avec retour haptique." },
    { q: "Traffic Jam Pilot ?", o: ["Bouchons", "Autoroute", "Parking", "Urgence"], a: 0, i: "Gestion dans les encombrements." },
    { q: "Traînée jantes ?", o: ["Aéro-inserts", "Peinture", "Rayons", "Pneus"], a: 0, i: "Fermeture pour lisser l'air." },
    { q: "Pre Sense ?", o: ["Sécurité préventive", "GPS", "Clim", "Audio"], a: 0, i: "Préparation aux chocs." },
    { q: "Avantage multi-bras ?", o: ["Prix", "Confort/Précision", "Poids", "Réparation"], a: 1, i: "Référence Audi." },
    { q: "Audi App Store ?", o: ["Jeux", "Apps tierces", "Accessoires", "Rien"], a: 1, i: "Divertissement intégré." },
    { q: "Base A3 ?", o: ["MQB Evo", "PPE", "J1", "MLB"], a: 0, i: "Plateforme pour moteurs transversaux." },
    { q: "Audi S ?", o: ["Sport", "Base", "Luxe", "Électrique"], a: 0, i: "Premier niveau de sportivité." },
    { q: "Torque vectoring ?", o: ["Répartition couple", "Vitesse", "Freinage", "Vitesses"], a: 0, i: "Gestion fine par roue." },
    { q: "Mild Hybrid (MHEV) ?", o: ["Rechargeable", "Hybridation 48V", "Électrique", "Diesel"], a: 1, i: "Assistance au démarrage." },
    { q: "Mission 2033 ?", o: ["Arrêt thermique", "Fusion", "F1", "2-temps"], a: 0, i: "Tout électrique." }
];

let currentQuiz = [];
let currentIdx = 0;

function startGame(mode) {
    currentQuiz = (mode === 'history') ? quizHistory : quizTech;
    currentIdx = 0;
    document.getElementById('menu-view').style.display = 'none';
    document.getElementById('game-view').style.display = 'block';
    loadQ();
}

function loadQ() {
    if(currentIdx >= currentQuiz.length) { alert("Quiz terminé !"); location.reload(); return; }
    const q = currentQuiz[currentIdx];
    document.getElementById('question-text').innerText = q.q;
    const cont = document.getElementById('options-container');
    cont.innerHTML = '';
    q.o.forEach((opt, i) => {
        const b = document.createElement('button');
        b.innerText = opt;
        b.onclick = () => reveal(i);
        cont.appendChild(b);
    });
    document.getElementById('insight-box').style.display = 'none';
}

function reveal(idx) {
    const correct = currentQuiz[currentIdx].a;
    const btns = document.querySelectorAll('.options button');
    btns.forEach((b, i) => {
        b.disabled = true;
        if(i === correct) b.classList.add('correct');
        else if(i === idx) b.classList.add('wrong');
    });
    document.getElementById('insight-text').innerText = currentQuiz[currentIdx].i;
    document.getElementById('insight-box').style.display = 'block';
}

function nextQuestion() {
    currentIdx++;
    loadQ();
}
</script>
</body>
</html>
